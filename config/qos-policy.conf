###############################################################################
# OpenSM QoS Policy (/etc/opensm/qos-policy.conf)
# Ref: https://docs.nvidia.com/networking/display/mlnxofedv461000/opensm#src-12013451_OpenSM-QualityofServiceManagementinOpenSM
#
# This configuration defines two Service Levels (SL):
#   • SL0 — default class (applied when no match)
#   • SL1 — background class, mapped to a specific QoSClass range
#
# Notes:
# - The “QoSClass” field comes from PathRecord requests (8-bit 0-255).
# - “DEFAULT” must always exist and will be used when no match rule triggers.
# - Match rules are evaluated in order; first match wins.
###############################################################################

qos-levels
    # -------------------------------------------------------------------------
    # Default QoS Level, applied to all traffic unless another rule matches.
    # -------------------------------------------------------------------------
    qos-level
        name: DEFAULT
        use: default QoS Level
        sl: 0
    end-qos-level

    # -------------------------------------------------------------------------
    # High-priority QoS Level (SL 1)
    # -------------------------------------------------------------------------
    qos-level
        name: BACKGROUND
        use: for low-priority traffic
        sl: 1
    end-qos-level
end-qos-levels


# QoS Match Rules, evaluated top to bottom, first match wins
qos-match-rules
    # Match by QoSClass range — map specific classes to SL 1
    qos-match-rule
        use: by QoS class
        qos-class: 8-11
        qos-level-name: BACKGROUND
    end-qos-match-rule

    # -------------------------------------------------------------------------
    # DEFAULT is implied, not required to be defined explicitly
    # -------------------------------------------------------------------------
end-qos-match-rules
