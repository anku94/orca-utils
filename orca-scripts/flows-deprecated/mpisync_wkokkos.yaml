nodes:
  kfilt:
    from: [kokkos_events]
    sql: |
      SELECT * FROM kokkos_events
      WHERE dura_ns > 1000000
  mpiw:
    from: [mpi_messages]
    sql: |
      SELECT * FROM mpi_messages
      WHERE dura_ns > 1000000
sinks:
  mpisync_pq:
    from: mpi_collectives
    type: parquet
  kfilt_pq:
    from: kfilt
    type: parquet
  mpiw_pq:
    from: mpiw
    type: parquet