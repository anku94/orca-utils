nodes:
  mpi_waits:
    from: [mpi_messages]
    sql: |
          SELECT * FROM mpi_messages 
          WHERE probe_name = 'MPI_Wait'
          AND dura_ns > 100000
  mpi_waitcnts:
    from: [mpi_waits]
    sql: SELECT COUNT(*) FROM mpi_waits
sinks:
  mpi_waits_sink:
    from: mpi_waits
    type: parquet
  mpi_waitcnts_sink:
    from: mpi_waitcnts
    type: grafana